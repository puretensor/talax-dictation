# cargo-audit configuration
#
# Waived advisories (see also deny.toml [advisories].ignore — CI runs BOTH
# `cargo audit` and `cargo deny check advisories`, so the ignore must live in
# both places).
#
# RUSTSEC-2026-0194 / RUSTSEC-2026-0195 — quadratic-time / unbounded-allocation
# DoS in quick-xml < 0.41.0. quick-xml is a purely TRANSITIVE dependency here,
# reached only via `tauri -> plist 1.8.0 -> quick-xml 0.38.4`, used for
# build-time Apple property-list (Info.plist) handling during tauri packaging —
# NOT for runtime parsing of untrusted network XML. It cannot be bumped yet:
# plist 1.8.0 constrains quick-xml to ^0.38 and no released plist/tauri consumes
# quick-xml >= 0.41.0. Re-evaluate and DROP these ignores once plist/tauri ship
# a build on quick-xml >= 0.41.0. Same waiver as TalaX (2026-07-05).
# Tracked: talax-dictation CI advisory hold, 2026-07-17.
[advisories]
ignore = ["RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]
