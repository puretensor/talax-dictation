name: ci

on:
  push:
  pull_request:

jobs:
  engine-and-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxtst-dev pkg-config cmake
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Rust format
        run: cargo fmt --all -- --check
      - name: Engine tests
        run: cargo test -p talax-engine
      - name: Frontend dependencies
        working-directory: ui
        run: npm ci
      - name: Frontend type check
        working-directory: ui
        run: npm run check
      - name: Frontend build
        working-directory: ui
        run: npm run build
